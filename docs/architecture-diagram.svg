<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Схема архитектуры FoodDash Web-Shop</title>
  <desc id="desc">Компонентная схема приложения: пользователи, клиент React, общий слой контрактов, сервер Express, PostgreSQL, файлы и внешние сервисы.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 700 30px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .group-title { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .label { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .client { fill: #e0f2fe; stroke: #0284c7; }
      .server { fill: #dcfce7; stroke: #16a34a; }
      .shared { fill: #fef3c7; stroke: #d97706; }
      .data { fill: #ede9fe; stroke: #7c3aed; }
      .external { fill: #fce7f3; stroke: #db2777; }
      .user { fill: #eef2ff; stroke: #4f46e5; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft-arrow { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow-soft); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect class="page" width="1400" height="860"/>
  <text class="title" x="50" y="46">Схема архитектуры FoodDash Web-Shop</text>
  <text class="subtitle" x="50" y="72">React/Vite SPA, Express API, общий TypeScript-контракт, PostgreSQL через Drizzle ORM и файловое хранилище изображений.</text>

  <rect class="group" x="45" y="95" width="1310" height="72" rx="12"/>
  <text class="group-title" x="65" y="122">Пользователи и роли</text>
  <rect class="user" x="255" y="113" width="170" height="36" rx="8"/>
  <text class="box-title" x="314" y="136">Гость</text>
  <rect class="user" x="455" y="113" width="170" height="36" rx="8"/>
  <text class="box-title" x="497" y="136">Покупатель</text>
  <rect class="user" x="655" y="113" width="170" height="36" rx="8"/>
  <text class="box-title" x="704" y="136">Курьер</text>
  <rect class="user" x="855" y="113" width="190" height="36" rx="8"/>
  <text class="box-title" x="897" y="136">Администратор</text>

  <rect class="group" x="45" y="205" width="360" height="315" rx="14"/>
  <text class="group-title" x="68" y="235">Клиентский слой: client</text>
  <rect class="client" x="70" y="258" width="310" height="48" rx="8"/>
  <text class="box-title" x="90" y="280">React SPA + wouter</text>
  <text class="box-text" x="90" y="297">client/src/App.tsx</text>
  <rect class="client" x="70" y="320" width="310" height="58" rx="8"/>
  <text class="box-title" x="90" y="342">Страницы</text>
  <text class="box-text" x="90" y="359">Storefront, CustomerAccount, CourierPage</text>
  <text class="box-text" x="90" y="374">Dashboard, Products, Orders, Reports, Users</text>
  <rect class="client" x="70" y="392" width="310" height="48" rx="8"/>
  <text class="box-title" x="90" y="414">UI и бизнес-компоненты</text>
  <text class="box-text" x="90" y="431">Sidebar, ProductForm, CourierDelivery, OrderMap</text>
  <rect class="client" x="70" y="454" width="310" height="44" rx="8"/>
  <text class="box-title" x="90" y="476">React Query hooks + apiRequest</text>
  <text class="box-text" x="90" y="493">use-auth, use-orders, use-courier, use-admin</text>

  <rect class="group" x="505" y="205" width="470" height="410" rx="14"/>
  <text class="group-title" x="528" y="235">Серверный слой: server</text>
  <rect class="server" x="530" y="258" width="420" height="44" rx="8"/>
  <text class="box-title" x="550" y="280">Express bootstrap</text>
  <text class="box-text" x="550" y="297">server/index.ts: middleware, API, Vite/static</text>
  <rect class="server" x="530" y="316" width="205" height="48" rx="8"/>
  <text class="box-title" x="550" y="338">Аутентификация</text>
  <text class="box-text" x="550" y="355">server/auth.ts, сессии, роли</text>
  <rect class="server" x="745" y="316" width="205" height="48" rx="8"/>
  <text class="box-title" x="765" y="338">Основной API</text>
  <text class="box-text" x="765" y="355">server/routes.ts</text>
  <rect class="server" x="530" y="378" width="205" height="58" rx="8"/>
  <text class="box-title" x="550" y="400">Админ-заказы</text>
  <text class="box-text" x="550" y="417">назначение курьеров,</text>
  <text class="box-text" x="550" y="432">возвраты, позиции</text>
  <rect class="server" x="745" y="378" width="205" height="58" rx="8"/>
  <text class="box-title" x="765" y="400">Доставка курьера</text>
  <text class="box-text" x="765" y="417">активные доставки,</text>
  <text class="box-text" x="765" y="432">статусы, очередность</text>
  <rect class="server" x="530" y="450" width="205" height="48" rx="8"/>
  <text class="box-title" x="550" y="472">Отмены и причины</text>
  <text class="box-text" x="550" y="489">routes-cancellation.ts</text>
  <rect class="server" x="745" y="450" width="205" height="48" rx="8"/>
  <text class="box-title" x="765" y="472">Отчеты XLSX</text>
  <text class="box-text" x="765" y="489">excel-report.ts</text>
  <rect class="server" x="530" y="512" width="420" height="60" rx="8"/>
  <text class="box-title" x="550" y="535">Слой бизнес-логики и доступа к данным</text>
  <text class="box-text" x="550" y="552">storage.ts, delivery-sequence.ts, api-utils.ts</text>
  <text class="box-text" x="550" y="567">транзакции, события заказов, аналитические выборки</text>

  <rect class="group" x="1035" y="205" width="320" height="315" rx="14"/>
  <text class="group-title" x="1058" y="235">Данные и файлы</text>
  <rect class="data" x="1060" y="258" width="270" height="58" rx="8"/>
  <text class="box-title" x="1080" y="280">PostgreSQL</text>
  <text class="box-text" x="1080" y="297">users, products, orders, order_events</text>
  <text class="box-text" x="1080" y="312">deliveries, locations, bonuses</text>
  <rect class="data" x="1060" y="330" width="270" height="48" rx="8"/>
  <text class="box-title" x="1080" y="352">Drizzle ORM + pg pool</text>
  <text class="box-text" x="1080" y="369">server/db.ts</text>
  <rect class="data" x="1060" y="392" width="270" height="44" rx="8"/>
  <text class="box-title" x="1080" y="414">uploads/</text>
  <text class="box-text" x="1080" y="431">изображения товаров</text>
  <rect class="data" x="1060" y="450" width="270" height="44" rx="8"/>
  <text class="box-title" x="1080" y="472">dist/public + XLSX</text>
  <text class="box-text" x="1080" y="489">сборка фронтенда и отчеты</text>

  <rect class="group" x="45" y="575" width="440" height="205" rx="14"/>
  <text class="group-title" x="68" y="605">Общий слой контрактов: shared</text>
  <rect class="shared" x="70" y="628" width="390" height="54" rx="8"/>
  <text class="box-title" x="90" y="650">shared/routes.ts</text>
  <text class="box-text" x="90" y="667">API-пути, схемы входных данных, buildUrl</text>
  <rect class="shared" x="70" y="696" width="390" height="54" rx="8"/>
  <text class="box-title" x="90" y="718">shared/schema.ts</text>
  <text class="box-text" x="90" y="735">роли, статусы, Drizzle-таблицы, Zod-схемы, типы</text>

  <rect class="group" x="535" y="665" width="420" height="155" rx="14"/>
  <text class="group-title" x="558" y="695">Внешние и платформенные зависимости</text>
  <rect class="external" x="560" y="718" width="180" height="36" rx="8"/>
  <text class="box-title" x="581" y="741">GPS браузера</text>
  <rect class="external" x="755" y="718" width="175" height="36" rx="8"/>
  <text class="box-title" x="790" y="741">OrderMap</text>
  <rect class="external" x="560" y="768" width="180" height="36" rx="8"/>
  <text class="box-title" x="583" y="791">MAX / Telegram</text>
  <rect class="external" x="755" y="768" width="175" height="36" rx="8"/>
  <text class="box-title" x="776" y="791">Marketplace status</text>

  <path class="arrow" d="M700 167 L700 185 L225 185 L225 205"/>
  <text class="label" x="244" y="194">использует</text>

  <path class="arrow" d="M405 350 L505 350"/>
  <rect x="420" y="323" width="70" height="18" rx="4" fill="#f8fafc"/>
  <text class="label" x="425" y="337">HTTP API</text>

  <path class="arrow" d="M975 350 L1035 350"/>
  <rect x="989" y="323" width="35" height="18" rx="4" fill="#f8fafc"/>
  <text class="label" x="994" y="337">SQL</text>

  <path class="soft-arrow dashed" d="M265 575 L265 520"/>
  <text class="label" x="284" y="552">типы и URL</text>
  <path class="soft-arrow dashed" d="M485 650 L650 615"/>
  <text class="label" x="520" y="642">таблицы и схемы</text>

  <path class="soft-arrow" d="M330 520 L575 665"/>
  <text class="label" x="383" y="594">карта и GPS</text>
  <path class="soft-arrow" d="M745 615 L745 665"/>
  <text class="label" x="760" y="647">контакты, статусы</text>
</svg>
